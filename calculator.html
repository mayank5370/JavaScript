<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <script>
            let calculation = '';
        </script>
        <body>
            <p>
               <button onclick="
                    calculation += '1';
                    console.log(calculation);
                ">1</button>

               <button onclick="
                    calculation += '2';
                    console.log(calculation);
               ">2</button>

               <button onclick="
                    calculation += '3';
                    console.log(calculation);
               ">3</button>

               <button onclick="
                    calculation += '4';
                    console.log(calculation);
               ">4</button> 

               <button onclick="
                    calculation += ' + ';
                    console.log(calculation);
               ">+</button>

               <button onclick="
                    calculation = eval(calculation);
                    console.log(calculation);
               ">=</button>

               <button onclick="
                    calculation = '';
                    console.log('Clear');
               ">Reset</button>
            </p>
        </body>
    </head>
</html>
